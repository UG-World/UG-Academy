<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | UG Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:url('bg1.png') center center/cover no-repeat;
min-height:100vh;
}

.overlay{
background:rgba(255,255,255,.92);
min-height:100vh;
}

/* NAVBAR (same as CEO page) */

nav{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 5%;
background:white;
box-shadow:0 2px 15px rgba(0,0,0,.08);
position:sticky;
top:0;
z-index:999;
}

.logo-box{
display:flex;
align-items:center;
gap:12px;
}

.logo-box img{
width:55px;
height:55px;
border-radius:15px;
}

.logo-box h2{
font-size:1.4rem;
color:#111;
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
text-decoration:none;
color:#111;
font-weight:600;
transition:.3s;
}

.nav-links a:hover{
color:#d4a100;
}

/* CONTACT SECTION */

.contact-container{
min-height:calc(100vh - 90px);
display:flex;
align-items:center;
justify-content:center;
padding:60px 8%;
}

.card{
width:100%;
max-width:650px;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
animation:fadeUp 1s ease;
}

/* TITLE */
.card h1{
text-align:center;
margin-bottom:25px;
color:#111;
font-size:2rem;
}

/* INPUTS */
label{
display:block;
margin:12px 0 6px;
font-weight:600;
color:#111;
}

input, select, textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
transition:.3s;
font-size:1rem;
}

input:focus, select:focus, textarea:focus{
border-color:#d4a100;
}

/* TEXTAREA */
textarea{
min-height:120px;
resize:none;
}

/* BUTTON */
button{
width:100%;
margin-top:20px;
padding:14px;
border:none;
background:#111;
color:white;
font-size:1.1rem;
font-weight:700;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#d4a100;
color:#111;
}

/* WORD COUNT */
small{
color:#666;
display:block;
margin-top:6px;
}

/* HIDDEN BOX */
#customBox{
display:none;
margin-top:10px;
}

/* ANIMATION */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */
@media(max-width:900px){

nav{
flex-direction:column;
gap:20px;
}

.nav-links{
flex-wrap:wrap;
justify-content:center;
}

.contact-container{
padding:30px 20px;
}

.card{
padding:25px;
}

}

</style>
</head>

<body>

<div class="overlay">

<nav>

<div class="logo-box">
<img src="UG-Academy.png" alt="">
<h2>UG Academy</h2>
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="facilities.html">Facilities</a>
<a href="CEO.html">CEO</a>
</div>

</nav>

<section class="contact-container">

<div class="card">

<h1>Contact Support</h1>

<form id="contactForm">

<!-- NAME -->
<label>Name</label>
<input type="text" required placeholder="Your Name">

<!-- EMAIL -->
<label>Email</label>
<input type="email" required placeholder="Your Email">

<!-- PHONE -->
<label>Phone</label>
<input type="tel" required placeholder="Your Phone Number">

<!-- ISSUE TYPE -->
<label>Select Issue Type</label>
<select id="issueType" required>
<option value="">-- Select Issue --</option>
<option value="website">Website Issue</option>
<option value="course">Course Inquiry</option>
<option value="payment">Payment Issue</option>
<option value="other">Other</option>
</select>

<!-- CUSTOM MESSAGE -->
<div id="customBox">
<label>Your Message</label>
<textarea id="customMessage" maxlength="500" placeholder="Write your message (max 75 words)"></textarea>
<small id="wordCount">0 / 75 words</small>
</div>

<button type="submit">Submit</button>

</form>

</div>

</section>

</div>

<script>

const issueType = document.getElementById("issueType");
const customBox = document.getElementById("customBox");
const customMessage = document.getElementById("customMessage");
const wordCount = document.getElementById("wordCount");

// SHOW / HIDE
issueType.addEventListener("change", function(){
if(this.value === "other"){
customBox.style.display = "block";
customMessage.setAttribute("required", "true");
} else {
customBox.style.display = "none";
customMessage.removeAttribute("required");
customMessage.value = "";
wordCount.textContent = "0 / 75 words";
}
});

// WORD LIMIT
customMessage.addEventListener("input", function(){
let words = this.value.trim().split(/\s+/).filter(w => w.length > 0);

if(words.length > 75){
words = words.slice(10,75);
this.value = words.join(" ");
}

wordCount.textContent = words.length + " / 75 words";
});

// SUBMIT CHECK
document.getElementById("contactForm").addEventListener("submit", function(e){
if(issueType.value === "other" && customMessage.value.trim() === ""){
e.preventDefault();
alert("Please write your message.");
}
});

</script>

</body>
</html>
