<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UG Academy</title>

    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    background:#ffffff;
    color:#111;
}

/* Overlay Remove */
.overlay{
    min-height:100vh;
    background:white;
}

/* Navbar */

nav{
    width:100%;
    height:85px;
    background:#fff;
    display:grid;
    grid-template-columns:auto 1fr auto;
    align-items:center;
    padding:0 6%;
    border-bottom:1px solid #e5e5e5;
}

/* Logo */

.logo-box{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-box img{
    width:55px;
    height:55px;
    object-fit:cover;
}

.logo-box h2{
    color:#111;
    font-size:1.8rem;
    font-weight:700;
}

/* Center Navigation */

.nav-links{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
}

.nav-links a{
    color:#111;
    text-decoration:none;
    font-weight:600;
    font-size:1rem;
    transition:.3s;
}

.nav-links a:hover{
    color:#d4a300;
}

/* Download Button Right */

.download-btn{
    text-decoration:none;
    background:#d4a300;
    color:white;
    padding:12px 24px;
    border-radius:10px;
    font-weight:700;
    transition:.3s;
}

.download-btn:hover{
    transform:translateY(-2px);
}

/* Hero */

.hero{
    min-height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero-content{
    color:#111;
}

.hero-content h1{
    font-size:3.5rem;
    margin-bottom:20px;
    font-weight:700;
}

.hero-content p{
    max-width:700px;
    margin:auto;
    margin-bottom:30px;
    font-size:1.1rem;
    line-height:1.7;
    color:#555;
}

.demo-btn{
    display:inline-block;
    padding:16px 55px;
    background:#111;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-size:1.1rem;
    font-weight:700;
    transition:.3s;
}

.demo-btn:hover{
    transform:translateY(-2px);
}

/* Mobile */

@media(max-width:900px){

    nav{
        display:flex;
        flex-direction:column;
        height:auto;
        padding:20px;
        gap:18px;
    }

    .nav-links{
        flex-wrap:wrap;
        gap:20px;
    }

    .hero-content h1{
        font-size:2.2rem;
    }

    .hero-content p{
        font-size:1rem;
    }

    .download-btn{
        width:220px;
        text-align:center;
    }
}
</style>
</head>
<body>

<div class="overlay">

<nav>

    <div class="logo-box">
        <img src="UG-Academy.png" alt="UG Academy">
        <h2>UG Academy</h2>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="facilities.html">Facilities</a>
        <a href="CEO.html">CEO</a>
    </div>

    <a href="https://github.com/YOUR_USERNAME/YOUR_REPO/releases/latest"
       class="download-btn">
       Download APK
    </a>

</nav>

<section class="hero">

    <div class="hero-content">
        <h1>Welcome to UG Academy</h1>

        <p>
            Learn App Development, Web Development and Technology
            with practical projects and premium study materials.
        </p>

        <a href="demo.html" class="demo-btn">Demo</a>
    </div>

</section>

</div>

</body>
</html>
